_schema-version: 3.3.0
ID: chatbot-cap
version: 1.0.0
description: "CAP chatbot."

parameters:
  deploy_mode: html5-repo
  enable-parallel-deployments: true

build-parameters:
  before-all:
    - builder: custom
      commands:
        - npm ci
        - npx cds build --production

modules:
  - name: chatbot-cap-srv
    type: nodejs
    path: gen/srv
    parameters:
      instances: 1
      buildpack: nodejs_buildpack
      memory: 256M
      disk-quota: 1024M
    build-parameters:
      builder: npm-ci
    provides:
      - name: srv-api
        properties:
          srv-url: ${default-url}
    requires:
      - name: chatbot-cap-destination
      - name: chatbot-cap-xsuaa

  - name: chatbot
    type: html5
    path: app/chatbot
    build-parameters:
      builder: custom
      commands:
        - npm install
        - npm run build:cf
      build-result: dist
      supported-platforms: []

  - name: chatbot-cap-app-content
    type: com.sap.application.content
    path: .
    requires:
      - name: chatbot-cap-html5-repo-host
        parameters:
          content-target: true
    build-parameters:
      build-result: resources
      requires:
        - name: chatbot
          artifacts:
            - chatbot-content.zip
          target-path: resources/

  - name: chatbot-cap-destination-content
    type: com.sap.application.content
    build-parameters:
      no-source: true
    requires:
      - name: chatbot-cap-destination
        parameters:
          content-target: true
      - name: chatbot-cap-html5-repo-host
        parameters:
          service-key:
            name: chatbot-cap-html5-repo-host-key
      - name: chatbot-cap-xsuaa
        parameters:
          service-key:
            name: chatbot-cap-xsuaa-key
    parameters:
      content:
        instance:
          existing_destinations_policy: update
          destinations:
            - Name: chatbot-cap-html5-repo-host
              ServiceInstanceName: chatbot-cap-html5-repo-host
              ServiceKeyName: chatbot-cap-html5-repo-host-key
              sap.cloud.service: chatbot.service

            - Name: chatbot-cap-xsuaa
              Authentication: OAuth2UserTokenExchange
              ServiceInstanceName: chatbot-cap-xsuaa
              ServiceKeyName: chatbot-cap-xsuaa-key
              sap.cloud.service: chatbot.service

resources:
  - name: chatbot-cap-destination
    type: org.cloudfoundry.managed-service
    requires:
      - name: srv-api
    parameters:
      service: destination
      service-plan: lite
      config:
        HTML5Runtime_enabled: true
        init_data:
          instance:
            existing_destinations_policy: update
            destinations:
              - Name: ui5
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
                URL: https://ui5.sap.com

              - Name: chatbot-cap-srv
                Authentication: NoAuthentication
                ProxyType: Internet
                Type: HTTP
                URL: ~{srv-api/srv-url}
                HTML5.DynamicDestination: true
                HTML5.ForwardAuthToken: true

  - name: chatbot-cap-xsuaa
    type: org.cloudfoundry.managed-service
    parameters:
      service: xsuaa
      service-plan: application
      path: ./xs-security.json

  - name: chatbot-cap-html5-repo-host
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-host

  - name: chatbot-cap-html5-repo-runtime
    type: org.cloudfoundry.managed-service
    parameters:
      service: html5-apps-repo
      service-plan: app-runtime